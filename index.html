<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standoff 2 Market Calculator</title>
    <!-- Обновленные цвета манифеста -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"SO2 Calc","short_name":"SO2 Calc","start_url":".","display":"standalone","background_color":"#000000","theme_color":"#82b1ff"}'>
    <style>
        body {
            /* Чистый черный цвет для OLED */
            background-color: #000000;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            /* Убраны тени, чтобы сливалось с фоном */
            background-color: #000000;
            padding: 20px;
            border-radius: 14px;
            max-width: 360px;
            width: 100%;
            box-sizing: border-box;
        }
        h2 {
            /* Бледно-голубой акцент */
            color: #82b1ff;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #aaa;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        input {
            width: 100%;
            /* Отступ справа, чтобы текст не залезал под галочку */
            padding: 12px 45px 12px 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #121212;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus {
            /* Голубой контур при нажатии */
            border-color: #82b1ff;
            outline: none;
        }
        .done-btn {
            position: absolute;
            right: 8px;
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .done-btn:hover, .done-btn:active {
            opacity: 1;
        }
        .done-btn svg {
            width: 24px;
            height: 24px;
            fill: #82b1ff;
        }
        .results {
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #bbb;
        }
        .result-row span:last-child {
            color: #fff;
            font-variant-numeric: tabular-nums;
        }
        .highlight {
            font-size: 18px;
            margin-top: 12px;
        }
        .profit-pos { color: #4caf50 !important; font-weight: bold; }
        .profit-neg { color: #f44336 !important; font-weight: bold; }
        .neutral { color: #888 !important; }
    </style>
</head>
<body>
    <div class="container">
        <h2>SO2 Spread Calc</h2>
        
        <!-- АСК теперь сверху -->
        <div class="input-group">
            <label for="ask">Текущий АСК (Ордер):</label>
            <div class="input-wrapper">
                <input type="number" id="ask" step="0.01" placeholder="0.00" oninput="calculate()" onkeydown="handleEnter(event, 'bid')">
                <button class="done-btn" onclick="document.getElementById('ask').blur()" tabindex="-1">
                    <svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>
                </button>
            </div>
        </div>

        <!-- БИД теперь снизу -->
        <div class="input-group">
            <label for="bid">Текущий БИД (Запрос):</label>
            <div class="input-wrapper">
                <input type="number" id="bid" step="0.01" placeholder="0.00" oninput="calculate()" onkeydown="handleEnter(event, 'blur')">
                <button class="done-btn" onclick="document.getElementById('bid').blur()" tabindex="-1">
                    <svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>
                </button>
            </div>
        </div>
        
        <div class="results">
            <div class="result-row">
                <span>Твоя покупка (Бид + 0.01):</span>
                <span id="buy-price">0.00</span>
            </div>
            <div class="result-row">
                <span>Твоя продажа (Аск - 0.01):</span>
                <span id="sell-price">0.00</span>
            </div>
            <div class="result-row">
                <span>Чистыми после продажи (-20%):</span>
                <span id="receive-price">0.00</span>
            </div>
            <hr style="border: 0; border-top: 1px dashed #333; margin: 15px 0;">
            <div class="result-row highlight">
                <span>Чистая прибыль:</span>
                <span id="profit" class="neutral">0.00 G</span>
            </div>
            <div class="result-row highlight">
                <span>Окупаемость (ROI):</span>
                <span id="roi" class="neutral">0.0%</span>
            </div>
        </div>
    </div>

    <script>
        // Функция перехвата Enter
        function handleEnter(event, targetAction) {
            if (event.key === 'Enter') {
                event.preventDefault(); // Блокируем стандартное поведение
                if (targetAction === 'blur') {
                    event.target.blur(); // Скрываем клавиатуру
                } else {
                    document.getElementById(targetAction).focus(); // Прыгаем на следующий инпут
                }
            }
        }

        function calculate() {
            const bid = parseFloat(document.getElementById('bid').value) || 0;
            const ask = parseFloat(document.getElementById('ask').value) || 0;

            if (bid <= 0 || ask <= 0) {
                resetResults();
                return;
            }

            const buyPrice = bid + 0.01;
            const sellPrice = ask - 0.01;
            const receivePrice = sellPrice * 0.8;
            const profit = receivePrice - buyPrice;
            const roi = (profit / buyPrice) * 100;

            document.getElementById('buy-price').innerText = buyPrice.toFixed(2);
            document.getElementById('sell-price').innerText = sellPrice.toFixed(2);
            document.getElementById('receive-price').innerText = receivePrice.toFixed(2);
            
            const profitEl = document.getElementById('profit');
            const roiEl = document.getElementById('roi');

            const sign = profit > 0 ? '+' : '';
            profitEl.innerText = sign + profit.toFixed(2) + ' G';
            roiEl.innerText = sign + roi.toFixed(1) + '%';

            if (profit > 0) {
                profitEl.className = 'profit-pos';
                roiEl.className = 'profit-pos';
            } else if (profit < 0) {
                profitEl.className = 'profit-neg';
                roiEl.className = 'profit-neg';
            } else {
                profitEl.className = 'neutral';
                roiEl.className = 'neutral';
            }
        }

        function resetResults() {
            document.getElementById('buy-price').innerText = '0.00';
            document.getElementById('sell-price').innerText = '0.00';
            document.getElementById('receive-price').innerText = '0.00';
            document.getElementById('profit').innerText = '0.00 G';
            document.getElementById('roi').innerText = '0.0%';
            document.getElementById('profit').className = 'neutral';
            document.getElementById('roi').className = 'neutral';
        }
    </script>
</body>
</html>
